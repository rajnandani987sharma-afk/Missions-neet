<!DOCTYPE html>
<html>

<head>
<title>Test</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Missions NEET Test</h2>

<p id="chapter"></p>

<script>

let subject = localStorage.getItem("subject")
let chapter = localStorage.getItem("chapter")

let file=""

if(subject=="physics"){
file="questions/physics_"+chapter.toLowerCase().replaceAll(" ","_")+".json"
}

if(subject=="chemistry"){
file="questions/chemistry_"+chapter.toLowerCase().replaceAll(" ","_")+".json"
}

if(subject=="botany"){
file="questions/botany_"+chapter.toLowerCase().replaceAll(" ","_")+".json"
}

if(subject=="zoology"){
file="questions/zoology_"+chapter.toLowerCase().replaceAll(" ","_")+".json"
}

fetch(file)
.then(res=>res.json())
.then(data=>{

questions=data

showQuestion()

})

  </script>

</body>

</html>
