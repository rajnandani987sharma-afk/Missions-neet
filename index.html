function showSubjects(){

box.innerHTML=""

box.innerHTML+="<h2>Select Subject</h2>"

box.innerHTML+=`<button onclick="openSubject('physics')">Physics</button>`
box.innerHTML+=`<button onclick="openSubject('chemistry')">Chemistry</button>`
box.innerHTML+=`<button onclick="openSubject('biology')">Biology</button>`

}

function openSubject(s){

subject=s

box.innerHTML=`<button onclick="showSubjects()">⬅ Back</button>`
box.innerHTML+="<h2>Select Chapter</h2>"

let chapters=Object.keys(data[s])

for(let i=0;i<chapters.length;i++){

box.innerHTML+=`<button onclick="startTest('${chapters[i]}')">
Chapter ${i+1} – ${chapters[i]}
</button><br>`

}

}



function startTest(ch){

chapter=ch
qIndex=0
score=0
showQuestion()

}



function showQuestion(){

clearInterval(timer)

let q=data[subject][chapter][qIndex]

timeLeft=60

box.innerHTML=`<button onclick="openSubject(subject)">⬅ Back</button>`
box.innerHTML+=`<div id="timer">Time: ${timeLeft}</div>`
box.innerHTML+=`<h3>${q.q}</h3>`
box.innerHTML+=`<div id="palette"></div>`

let palette=""

for(let i=0;i<data[subject][chapter].length;i++){
palette+=`<button onclick="jumpQuestion(${i})">${i+1}</button>`
}

document.getElementById("palette").innerHTML=palette

function jumpQuestion(n){
qIndex=n
showQuestion()
}

box.innerHTML+=`<button id="a" onclick="answer('a')">${q.a}</button><br>`
box.innerHTML+=`<button id="b" onclick="answer('b')">${q.b}</button><br>`
box.innerHTML+=`<button id="c" onclick="answer('c')">${q.c}</button><br>`
box.innerHTML+=`<button id="d" onclick="answer('d')">${q.d}</button>`

box.innerHTML+=`<br><br>
<button onclick="prevQuestion()">⬅ Back</button>
<button onclick="nextQuestion()">Next ➡</button>`
  
timer=setInterval(function(){

timeLeft--
document.getElementById("timer").innerText="Time: "+timeLeft

if(timeLeft<=0){
clearInterval(timer)
nextQuestion()
}

},1000)

}



function answer(ans){

clearInterval(timer)

let q=data[subject][chapter][qIndex]

let btn=document.getElementById(ans)

if(ans==q.correct){
btn.classList.add("correct")
btn.innerHTML=btn.innerHTML+" ✔️"
score++
}else{
btn.classList.add("wrong")
btn.innerHTML=btn.innerHTML+" ❌"
document.getElementById(q.correct).classList.add("correct")
document.getElementById(q.correct).innerHTML += " ✔️"
}

setTimeout(nextQuestion,1000)

}



function nextQuestion(){

qIndex++

if(qIndex<data[subject][chapter].length){

showQuestion()

}else{

box.innerHTML=`<h2>Test Finished</h2>Score: ${score}/${data[subject][chapter].length}<br><br>`
box.innerHTML+=`<button onclick="openSubject(subject)">⬅ Back to Chapters</button>`

}

}
  
function prevQuestion(){

if(qIndex>0){
qIndex--
showQuestion()
}

  }


showSubjects()

</script>
