<!DOCTYPE html>
<html>
<head>
<title>Mission NEET</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
background:black;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#box{
margin-top:40px;
}

</style>

</head>

<body>

<h1>Mission NEET</h1>

<div id="box"></div>

<script>

let box=document.getElementById("box")

let subject=""
let chapter=""
let qIndex=0
let score=0

let data={

physics:{
"Motion in Straight Line":[
{q:"Unit of velocity?",a:"m/s",b:"kg",c:"N",d:"m",correct:"a"},
{q:"Acceleration formula?",a:"v/u",b:"v-u/t",c:"u-v",d:"t/u",correct:"b"}
],

"Laws of Motion":[
{q:"F=ma is which law?",a:"1st",b:"2nd",c:"3rd",d:"none",correct:"b"}
]

},

chemistry:{
"Structure of Atom":[
{q:"Electron charge?",a:"positive",b:"negative",c:"neutral",d:"none",correct:"b"}
]
},

botany:{
"Cell":[
{q:"Powerhouse of cell?",a:"Nucleus",b:"Mitochondria",c:"Golgi",d:"Ribosome",correct:"b"}
]
},

zoology:{
"Human Physiology":[
{q:"Heart chambers?",a:"2",b:"3",c:"4",d:"5",correct:"c"}
]
}

}

function showSubjects(){

box.innerHTML=""

box.innerHTML+="<h2>Select Subject</h2>"

box.innerHTML+=`<button onclick="openSubject('physics')">Physics</button>`
box.innerHTML+=`<button onclick="openSubject('chemistry')">Chemistry</button>`
box.innerHTML+=`<button onclick="openSubject('botany')">Botany</button>`
box.innerHTML+=`<button onclick="openSubject('zoology')">Zoology</button>`

}

function openSubject(s){

subject=s

box.innerHTML="<h2>Select Chapter</h2>"

let chapters=Object.keys(data[s])

for(let i=0;i<chapters.length;i++){

box.innerHTML+=`<button onclick="startTest('${chapters[i]}')">${chapters[i]}</button><br>`

}

}

function startTest(ch){

chapter=ch
qIndex=0
score=0

showQuestion()

}

function showQuestion(){

let q=data[subject][chapter][qIndex]

box.innerHTML=""

box.innerHTML+=`<h3>${q.q}</h3>`

box.innerHTML+=`<button onclick="answer('a')">${q.a}</button><br>`
box.innerHTML+=`<button onclick="answer('b')">${q.b}</button><br>`
box.innerHTML+=`<button onclick="answer('c')">${q.c}</button><br>`
box.innerHTML+=`<button onclick="answer('d')">${q.d}</button>`

}

function answer(ans){

let q=data[subject][chapter][qIndex]

if(ans==q.correct){
score++
}

qIndex++

if(qIndex<data[subject][chapter].length){

showQuestion()

}else{

box.innerHTML="<h2>Test Finished</h2>"
box.innerHTML+="Score: "+score

}

}

showSubjects()

</script>

</body>
</html>
