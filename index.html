function showSubjects(){

box.innerHTML=""

box.innerHTML+="<h2>Select Subject</h2>"

box.innerHTML+=`<button onclick="openSubject('physics')">Physics</button>`
box.innerHTML+=`<button onclick="openSubject('chemistry')">Chemistry</button>`
box.innerHTML+=`<button onclick="openSubject('botany')">Botany</button>`
box.innerHTML+=`<button onclick="openSubject('zoology')">Zoology</button>`

}

function openSubject(s){

subject=s

box.innerHTML="<button onclick='showSubjects()'>⬅ Back</button>"
box.innerHTML+="<h2>Select Chapter</h2>"
  
let chapters=Object.keys(data[s])

for(let i=0;i<chapters.length;i++){

let count = data[subject][chapters[i]] ? data[subject][chapters[i]].length : 0

box.innerHTML+=`<button onclick="startTest('${chapters[i]}')">${chapters[i]} (${count})</button><br>`
}

}

function startTest(ch){

chapter=ch
qIndex=0
score=0

showQuestion()

}

function showQuestion(){

let q=data[subject][chapter][qIndex]

box.innerHTML=""

box.innerHTML+=`<button 
onclick="openSubject(subject)">⬅ Back</button><br><br>`

box.innerHTML+=`<h3>${q.q}</h3>`

box.innerHTML+=`<button onclick="answer('a')">${q.a}</button><br>`
box.innerHTML+=`<button onclick="answer('b')">${q.b}</button><br>`
box.innerHTML+=`<button onclick="answer('c')">${q.c}</button><br>`
box.innerHTML+=`<button onclick="answer('d')">${q.d}</button>`

}

function answer(ans){

let q=data[subject][chapter][qIndex]

if(ans==q.correct){
score++
}

qIndex++

if(qIndex<data[subject][chapter].length){

showQuestion()

}else{

box.innerHTML="<h2>Test Finished</h2>"

box.innerHTML+="Score: "+score+"<br><br>"

box.innerHTML+="<button onclick='openSubject(subject)'>⬅ Back to Chapters</button>"

}

}

showSubjects()
