<!DOCTYPE html>
<html>
<head>
<title>Mission NEET</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
background:black;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

input{
padding:10px;
font-size:16px;
}

</style>

</head>

<body>

<h1>Mission NEET</h1>

<div id="screen"></div>

<script>

let screen=document.getElementById("screen")

let studentName=""
let subject=""
let chapter=""
let qIndex=0
let score=0

let chapters={

physics:[
"Units and Dimensions",
"Motion in Straight Line",
"Laws of Motion"
],

chemistry:[
"Structure of Atom",
"Chemical Bonding"
],

botany:[
"Cell Structure",
"Plant Kingdom"
],

zoology:[
"Animal Kingdom",
"Human Physiology"
]

}

let questions={

"Units and Dimensions":[
{q:"SI unit of length?",a:"meter",b:"second",c:"kg",d:"ampere",correct:"a"}
],

"Motion in Straight Line":[
{q:"Velocity unit?",a:"m/s",b:"kg",c:"N",d:"m",correct:"a"}
],

"Laws of Motion":[
{q:"F = ma law?",a:"1st",b:"2nd",c:"3rd",d:"none",correct:"b"}
],

"Structure of Atom":[
{q:"Electron charge?",a:"positive",b:"negative",c:"neutral",d:"none",correct:"b"}
],

"Chemical Bonding":[
{q:"NaCl bond?",a:"ionic",b:"covalent",c:"metallic",d:"none",correct:"a"}
],

"Cell Structure":[
{q:"Powerhouse of cell?",a:"nucleus",b:"mitochondria",c:"ribosome",d:"golgi",correct:"b"}
],

"Plant Kingdom":[
{q:"Green pigment?",a:"chlorophyll",b:"hemoglobin",c:"melanin",d:"keratin",correct:"a"}
],

"Animal Kingdom":[
{q:"Largest group?",a:"arthropoda",b:"mollusca",c:"chordata",d:"annelida",correct:"a"}
],

"Human Physiology":[
{q:"Heart chambers?",a:"2",b:"3",c:"4",d:"5",correct:"c"}
]

}


function showStart(){

screen.innerHTML=""

screen.innerHTML+=`<input id="name" placeholder="Enter your name"><br><br>`
screen.innerHTML+=`<button onclick="start()">Start NEET Preparation</button>`

}

function start(){

studentName=document.getElementById("name").value

showSubjects()

}

function showSubjects(){

screen.innerHTML="<h2>Select Subject</h2>"

screen.innerHTML+=`<button onclick="openSubject('physics')">Physics</button>`
screen.innerHTML+=`<button onclick="openSubject('chemistry')">Chemistry</button>`
screen.innerHTML+=`<button onclick="openSubject('botany')">Botany</button>`
screen.innerHTML+=`<button onclick="openSubject('zoology')">Zoology</button>`

}

function openSubject(s){

subject=s

screen.innerHTML="<h2>Select Chapter</h2>"

let list=chapters[s]

for(let i=0;i<list.length;i++){

screen.innerHTML+=`<button onclick="startTest('${list[i]}')">${list[i]}</button><br>`

}

}

function startTest(ch){

chapter=ch
qIndex=0
score=0

showQuestion()

}

function showQuestion(){

let q=questions[chapter][qIndex]

screen.innerHTML=""

screen.innerHTML+=`<h3>${q.q}</h3>`

screen.innerHTML+=`<button onclick="answer('a')">${q.a}</button><br>`
screen.innerHTML+=`<button onclick="answer('b')">${q.b}</button><br>`
screen.innerHTML+=`<button onclick="answer('c')">${q.c}</button><br>`
screen.innerHTML+=`<button onclick="answer('d')">${q.d}</button>`

}

function answer(ans){

let q=questions[chapter][qIndex]

if(ans==q.correct){
score++
}

qIndex++

if(qIndex<questions[chapter].length){

showQuestion()

}else{

screen.innerHTML="<h2>Test Finished</h2>"
screen.innerHTML+="Name: "+studentName+"<br>"
screen.innerHTML+="Score: "+score

}

}

showStart()

</script>

</body>
</html>
