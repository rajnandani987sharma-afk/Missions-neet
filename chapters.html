<!DOCTYPE html>
<html>

<head>
<title>Chapters</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2 id="title">Select Chapter</h2>

<div id="chapters"></div>

<script>

let subject = localStorage.getItem("subject")

let physics = [
"Units and Dimensions",
"Motion in Straight Line",
"Motion in Plane",
"Laws of Motion",
"Work Energy Power",
"Rotational Motion",
"Gravitation",
"Mechanical Properties of Solids",
"Mechanical Properties of Fluids",
"Thermodynamics",
"Oscillations",
"Waves",
"Electric Charges and Fields",
"Current Electricity",
"Magnetism",
"Electromagnetic Induction",
"Alternating Current",
"Ray Optics",
"Wave Optics",
"Dual Nature of Matter",
"Atoms",
"Nuclei",
"Semiconductors"
]

let chemistry = [
"Some Basic Concepts",
"Structure of Atom",
"Periodic Table",
"Chemical Bonding",
"States of Matter",
"Thermodynamics",
"Equilibrium",
"Redox Reaction",
"Organic Chemistry Basics",
"Hydrocarbons",
"Solutions",
"Electrochemistry",
"Chemical Kinetics",
"Surface Chemistry",
"Biomolecules",
"Polymers"
]

let botany = [
"Cell Structure",
"Biological Classification",
"Plant Kingdom",
"Morphology of Flowering Plants",
"Anatomy of Plants",
"Transport in Plants",
"Mineral Nutrition",
"Photosynthesis",
"Respiration in Plants",
"Plant Growth"
]

let zoology = [
"Animal Kingdom",
"Structural Organisation in Animals",
"Human Digestion",
"Breathing and Exchange",
"Body Fluids",
"Excretory System",
"Nervous System",
"Chemical Coordination",
"Locomotion",
"Human Reproduction",
"Reproductive Health",
"Human Health and Disease"
]

let chapters = []

if(subject=="physics"){chapters=physics}
if(subject=="chemistry"){chapters=chemistry}
if(subject=="botany"){chapters=botany}
if(subject=="zoology"){chapters=zoology}

document.getElementById("title").innerText = subject.toUpperCase()+" Chapters"

let html=""

for(let i=0;i<chapters.length;i++){

html += "<button onclick=\"openTest('"+chapters[i]+"')\">"+chapters[i]+"</button><br><br>"

}

document.getElementById("chapters").innerHTML = html


function openTest(ch){

localStorage.setItem("chapter",ch)

window.location.href="test.html"

}

</script>

</body>
</html>
